# Software Factory — Markdownlint configuration
# Rules reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
#
# Philosophy: enable all rules, disable only those with deliberate structural conflicts
# in the governance document format. Each disabled rule states the reason.

default: true

# MD013 — Line length
# Disabled: governance tables require long lines; enforcing line length would
# force table rewrites that reduce readability without improving content quality.
MD013: false

# MD022 — Headings should be surrounded by blank lines
# Disabled: governance documents use a deliberate pattern where section headings
# (### Title, ### Context, ### Decision) are immediately followed by content.
# This is a structural convention in DECISION_LOG.md and IMPLEMENTATION_HISTORY.md.
MD022: false

# MD024 — Multiple headings with the same content
# Disabled: DECISION_LOG.md uses ## DEC-001, ## DEC-002, etc. and
# IMPLEMENTATION_HISTORY.md uses ## IMP-001, ## IMP-002, etc.
# These sequential numbered headings are the same text repeated by design.
MD024: false

# MD033 — Inline HTML
# Disabled: template files use <!-- comment --> placeholders to guide authors.
# These are essential for template usability and are not presentational HTML.
MD033: false

# MD040 — Fenced code blocks should have a language specified
# Disabled: ASCII diagrams, version string examples, and pseudo-code blocks
# intentionally use language-free fences. Forcing a language on these blocks
# would require inventing labels (e.g., "text") that add noise without value.
MD040: false

# MD012 — Multiple consecutive blank lines
# Disabled: pull_request_template.md uses double blank lines in GIA sections
# as deliberate white space for authors to fill in their answers. Reducing
# these to single blank lines makes the form harder to work with.
MD012: false

# MD031 — Fenced code blocks should be surrounded by blank lines
# Disabled: ASCII architecture diagrams and hierarchical tree blocks are
# embedded in flowing content where surrounding blank lines would break
# the visual connection to the prose that introduces them.
MD031: false

# MD032 — Lists should be surrounded by blank lines
# Disabled: governance documents follow a deliberate tight-list pattern
# where bullet lists immediately follow section headings and bold labels.
# The pattern is consistent throughout all 36 files and aids scan-reading.
# Enforcing blank lines would require 200+ changes across all standards
# without improving comprehension.
MD032: false

# MD036 — Emphasis used instead of a heading
# Disabled: CHANGELOG.md uses bold text (e.g., **Governance Standards**)
# as inline section labels within changelog entries. Converting them to
# headings would disrupt the CHANGELOG format and visual hierarchy.
MD036: false
