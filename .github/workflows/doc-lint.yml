name: Doc Lint

on:
  push:
    branches: [main]
    paths: ['**/*.md', '.markdownlint.yaml']
  pull_request:
    branches: [main]
    paths: ['**/*.md', '.markdownlint.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**/*.md
